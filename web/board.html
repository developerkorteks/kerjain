<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lokerwa Review Board</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--card:#1e2130;--border:#2d3147;
  --text:#e2e8f0;--muted:#8892a4;
  --raw-hdr:#1c2030;--rev-hdr:#1c1508;--val-hdr:#0d1f18;
  --raw-clr:#6b7280;--rev-clr:#f59e0b;--val-clr:#10b981;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden}

/* HEADER */
.hdr{padding:10px 18px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.hdr-title{font-size:1rem;font-weight:700;color:#a78bfa;white-space:nowrap}
.hdr-title a{color:#6366f1;text-decoration:none;font-size:.8rem;margin-left:8px;font-weight:400}
.hdr-title a:hover{text-decoration:underline}
.filters{display:flex;gap:6px;flex:1;flex-wrap:wrap}
.filters select,.filters input{background:var(--card);border:1px solid var(--border);color:var(--text);padding:5px 9px;border-radius:5px;font-size:.78rem;cursor:pointer}
.filters input{flex:1;min-width:140px}
.stats{display:flex;gap:10px;font-size:.76rem;flex-shrink:0}
.stat{display:flex;align-items:center;gap:4px}
.dot{width:8px;height:8px;border-radius:50%}
.d-raw{background:var(--raw-clr)}.d-rev{background:var(--rev-clr)}.d-val{background:var(--val-clr)}

/* BOARD */
.board{display:flex;height:calc(100vh - 48px);overflow:hidden}
.col{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--border);min-width:300px}
.col:last-child{border-right:none}
.col-hdr{padding:10px 14px;font-size:.8rem;font-weight:700;letter-spacing:.04em;display:flex;align-items:center;gap:8px;flex-shrink:0;border-bottom:1px solid var(--border);text-transform:uppercase}
.col-raw .col-hdr{background:var(--raw-hdr)}
.col-rev .col-hdr{background:var(--rev-hdr)}
.col-val .col-hdr{background:var(--val-hdr)}
.badge{padding:1px 7px;border-radius:10px;font-size:.7rem;font-weight:700}
.col-raw .badge{background:var(--raw-clr);color:#fff}
.col-rev .badge{background:var(--rev-clr);color:#000}
.col-val .badge{background:var(--val-clr);color:#fff}

.cards{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
.cards::-webkit-scrollbar{width:3px}
.cards::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:10px;transition:border-color .15s}
.card:hover{border-color:#4c4f70}
.card.non-job{opacity:.55}
.card-hdr{display:flex;align-items:center;gap:5px;margin-bottom:7px;font-size:.72rem}
.tbadge{padding:1px 6px;border-radius:3px;font-weight:700;font-size:.65rem;text-transform:uppercase}
.t-image{background:#1e3a5f;color:#60a5fa}
.t-text{background:#2d1b4e;color:#c084fc}
.nb-badge{background:#7f1d1d;color:#fca5a5;padding:1px 6px;border-radius:3px;font-size:.65rem;font-weight:700}
.card-grp{flex:1;color:var(--muted);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.card-time{color:#4c5166;flex-shrink:0}

.card-img{width:100%;height:130px;object-fit:cover;border-radius:5px;margin-bottom:7px;cursor:pointer;display:block}
.card-img:hover{opacity:.88}

.fields{display:flex;flex-direction:column;gap:3px;font-size:.77rem;margin-bottom:7px}
.frow{display:flex;gap:5px}
.fk{color:var(--muted);flex-shrink:0;width:52px;font-size:.7rem;padding-top:1px}
.fv{word-break:break-word;color:var(--text)}
.fv.empty{color:#3d4261;font-style:italic}
.raw-prev{color:#444e66;font-size:.7rem;line-height:1.4;max-height:50px;overflow:hidden;margin-bottom:6px;white-space:pre-wrap}

.card-acts{display:flex;gap:5px;flex-wrap:wrap}
.btn{padding:4px 10px;border-radius:4px;border:none;cursor:pointer;font-size:.74rem;font-weight:600;transition:opacity .15s;white-space:nowrap}
.btn:hover{opacity:.82}
.btn:disabled{opacity:.35;cursor:default}
.b-edit{background:#2d3147;color:var(--text);flex:1}
.b-fwd{background:#065f46;color:#6ee7b7}
.b-mid{background:#78350f;color:#fde68a}
.b-back{background:#1f2937;color:#9ca3af}
.b-del{background:#3b0000;color:#f87171;padding:4px 7px}

.empty-col{text-align:center;padding:40px 16px;color:#3d4261;font-size:.82rem}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:12px}
.overlay.hide{display:none}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;width:100%;max-width:620px;max-height:92vh;overflow-y:auto;padding:20px}
.modal h2{font-size:.95rem;font-weight:700;color:#a78bfa;margin-bottom:14px}
.m-img{width:100%;border-radius:6px;margin-bottom:12px;max-height:260px;object-fit:contain;background:#111}
.m-raw{background:var(--card);border-radius:5px;padding:8px 10px;font-size:.72rem;color:#666;line-height:1.5;max-height:100px;overflow-y:auto;margin-bottom:14px;white-space:pre-wrap;border:1px solid var(--border)}
.fg{display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.fg label{font-size:.72rem;color:var(--muted)}
.fg input,.fg select,.fg textarea{background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 9px;border-radius:5px;font-size:.82rem;font-family:inherit;width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#7c3aed}
.fg textarea{resize:vertical;min-height:72px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fgrid .span2{grid-column:1/-1}
.m-acts{display:flex;gap:7px;margin-top:16px;flex-wrap:wrap}
.b-save{background:#7c3aed;color:#fff;flex:1;padding:8px}
.b-save-valid{background:#065f46;color:#6ee7b7;padding:8px 14px}
.b-cancel{background:var(--card);color:var(--muted);padding:8px 14px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">Lokerwa <span style="color:var(--muted);font-weight:400">Board</span>
    <a href="/">← Dashboard</a>
    <a href="/api-test" style="font-size:.72rem;color:#9ca3af;text-decoration:none;border:1px solid #1f2937;padding:3px 9px;border-radius:4px;background:#1a2230;margin-left:4px">🔌 API Tester</a>
  </div>
  <div class="filters">
    <select id="fGroup"><option value="">Semua Group</option></select>
    <select id="fType">
      <option value="">Semua Tipe</option>
      <option value="text">📝 Text</option>
      <option value="image">🖼️ Image</option>
    </select>
    <input id="fSearch" type="text" placeholder="Cari title, kontak, teks…">
  </div>
  <div class="stats">
    <span class="stat"><span class="dot d-raw"></span><span id="sRaw">0</span> raw</span>
    <span class="stat"><span class="dot d-rev"></span><span id="sRev">0</span> perbaiki</span>
    <span class="stat"><span class="dot d-val"></span><span id="sVal">0</span> valid</span>
    <button class="btn b-back" style="padding:3px 9px" onclick="loadAll()">↺ Refresh</button>
  </div>
</div>

<div class="board">
  <div class="col col-raw">
    <div class="col-hdr">📥 Perlu Review <span class="badge" id="hRaw">0</span></div>
    <div class="cards" id="cRaw"><div class="empty-col">Memuat…</div></div>
  </div>
  <div class="col col-rev">
    <div class="col-hdr">✏️ Diperbaiki <span class="badge" id="hRev">0</span></div>
    <div class="cards" id="cRev"></div>
  </div>
  <div class="col col-val">
    <div class="col-hdr">✅ Valid <span class="badge" id="hVal">0</span></div>
    <div class="cards" id="cVal"></div>
  </div>
</div>

<!-- Edit Modal -->
<div class="overlay hide" id="overlay">
  <div class="modal">
    <h2 id="mTitle">Edit Job Posting</h2>
    <div id="mImgWrap"></div>
    <div class="m-raw hide" id="mRaw"></div>
    <div class="fgrid">
      <div class="fg span2">
        <label>Title / Posisi</label>
        <input id="eTitle" type="text">
      </div>
      <div class="fg">
        <label>Perusahaan (PT/CV/Toko…)</label>
        <input id="eCompany" type="text">
      </div>
      <div class="fg">
        <label>Lokasi</label>
        <input id="eLocation" type="text">
      </div>
      <div class="fg">
        <label>Gender</label>
        <select id="eGender">
          <option value="">-</option>
          <option value="male">Laki-laki</option>
          <option value="female">Perempuan</option>
          <option value="both">Keduanya</option>
        </select>
      </div>
      <div class="fg">
        <label>Pendidikan Min.</label>
        <input id="eEdu" type="text" placeholder="SMA, D3, S1…">
      </div>
      <div class="fg">
        <label>Usia Min</label>
        <input id="eAgeMin" type="number" min="0" max="99">
      </div>
      <div class="fg">
        <label>Usia Maks</label>
        <input id="eAgeMax" type="number" min="0" max="99">
      </div>
      <div class="fg">
        <label>Gaji / Upah</label>
        <input id="eSalary" type="text">
      </div>
      <div class="fg">
        <label>Jam Kerja</label>
        <input id="eHours" type="text">
      </div>
      <div class="fg">
        <label>Kontak</label>
        <input id="eContact" type="text">
      </div>
      <div class="fg">
        <label>Tipe Kontak</label>
        <select id="eCtType">
          <option value="">-</option>
          <option value="wa">WhatsApp</option>
          <option value="email">Email</option>
          <option value="langsung">Datang Langsung</option>
        </select>
      </div>
      <div class="fg span2">
        <label>Persyaratan (satu per baris)</label>
        <textarea id="eReqs" rows="4"></textarea>
      </div>
      <div class="fg span2">
        <label>Benefit (satu per baris)</label>
        <textarea id="eBens" rows="3"></textarea>
      </div>
      <div class="fg">
        <label>Status</label>
        <select id="eStatus">
          <option value="raw">📥 Perlu Review</option>
          <option value="review">✏️ Diperbaiki</option>
          <option value="valid">✅ Valid</option>
        </select>
      </div>
      <div class="fg" style="justify-content:flex-end;padding-top:18px">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
          <input id="eIsJob" type="checkbox" style="width:auto"> Ini lowongan kerja
        </label>
      </div>
    </div>
    <div class="m-acts">
      <button class="btn b-save" onclick="saveEdit()">💾 Simpan</button>
      <button class="btn b-save-valid" onclick="saveEdit('valid')">✅ Simpan & Valid</button>
      <button class="btn b-cancel" onclick="closeModal()">Batal</button>
    </div>
  </div>
</div>

<script>
let all = [];
let editId = null;

// ─── LOAD ───────────────────────────────────────────────
async function loadAll() {
  try {
    const r = await fetch('/api/jobs?limit=1000');
    const d = await r.json();
    all = d.jobs || [];
    buildGroupFilter();
    render();
  } catch(e) {
    document.getElementById('cRaw').innerHTML = '<div class="empty-col">Gagal memuat data</div>';
  }
}

function buildGroupFilter() {
  const sel = document.getElementById('fGroup');
  const prev = sel.value;
  const groups = {};
  all.forEach(j => { if (j.group_name || j.source_group) groups[j.source_group] = j.group_name || j.source_group; });
  sel.innerHTML = '<option value="">Semua Group</option>';
  Object.entries(groups).sort((a,b) => a[1].localeCompare(b[1])).forEach(([jid, name]) => {
    const o = document.createElement('option');
    o.value = jid; o.textContent = name;
    if (jid === prev) o.selected = true;
    sel.appendChild(o);
  });
}

// ─── RENDER ─────────────────────────────────────────────
function filters() {
  return {
    group: document.getElementById('fGroup').value,
    type:  document.getElementById('fType').value,
    q:     document.getElementById('fSearch').value.toLowerCase(),
  };
}

function matches(j, f) {
  if (f.group && j.source_group !== f.group) return false;
  if (f.type  && j.msg_type    !== f.type)  return false;
  if (f.q) {
    const hay = [j.title,j.contact,j.group_name,j.company,j.location,j.raw_text,''].join(' ').toLowerCase();
    if (!hay.includes(f.q)) return false;
  }
  return true;
}

function render() {
  const f = filters();
  const cols = { raw:[], review:[], valid:[] };
  all.forEach(j => {
    if (!matches(j, f)) return;
    const s = j.status || 'raw';
    (cols[s] || cols.raw).push(j);
  });

  ['raw','review','valid'].forEach(s => {
    const el = document.getElementById({raw:'cRaw',review:'cRev',valid:'cVal'}[s]);
    el.innerHTML = '';
    if (!cols[s].length) { el.innerHTML = '<div class="empty-col">Kosong</div>'; return; }
    cols[s].forEach(j => el.appendChild(mkCard(j)));
  });

  const n = {raw: cols.raw.length, review: cols.review.length, valid: cols.valid.length};
  ['Raw','Rev','Val'].forEach((k,i) => {
    const cnt = [n.raw, n.review, n.valid][i];
    document.getElementById('s'+k).textContent = cnt;
    document.getElementById('h'+k).textContent = cnt;
  });
}

// ─── CARD ───────────────────────────────────────────────
function mkCard(j) {
  const div = document.createElement('div');
  div.className = 'card' + (j.is_job_posting === false ? ' non-job' : '');
  div.id = 'card-' + j.id;

  const ts = j.posted_at ? new Date(j.posted_at) : null;
  const timeStr = ts ? ts.toLocaleString('id',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '';

  const imgHtml = (j.msg_type === 'image' && j.media_path)
    ? `<img class="card-img" src="/media/${esc(j.media_path)}" loading="lazy" onclick="window.open('/media/${esc(j.media_path)}','_blank')">`
    : '';

  const senderLabel = j.sender_name || j.sender_jid || '';
  const phoneInfo   = j.sender_phone ? ` · ${j.sender_phone}` : '';

  const fRows = [
    j.title    && row('Posisi', j.title),
    j.company  && row('PT/CV',  j.company),
    j.location && row('Lokasi', j.location),
    j.contact  && row('Kontak', j.contact + (j.contact_type ? ` (${j.contact_type})` : '')),
    senderLabel && row('Pengirim', senderLabel + phoneInfo),
    j.gender   && row('Gender', {male:'Laki-laki',female:'Perempuan',both:'Keduanya'}[j.gender]||j.gender),
    j.age_max  && row('Usia',   (j.age_min ? j.age_min+'–' : 'maks ') + j.age_max + ' th'),
    j.salary   && row('Gaji',   j.salary),
    j.education && row('Edu',   j.education),
  ].filter(Boolean).join('');

  const noFields = !fRows && `<div class="fv empty">Tidak ada field terekstrak</div>`;
  const rawPrev  = (j.msg_type==='text' && j.raw_text)
    ? `<div class="raw-prev">${esc((j.raw_text||'').slice(0,150))}</div>` : '';
  const nbBadge  = j.is_job_posting===false ? '<span class="nb-badge">BUKAN LOKER</span>' : '';

  const s = j.status || 'raw';
  const moveHtml =
    s === 'raw'    ? `<button class="btn b-mid"  onclick="move('${j.id}','review')">→ Perbaiki</button><button class="btn b-fwd" onclick="move('${j.id}','valid')">✓ Valid</button>` :
    s === 'review' ? `<button class="btn b-back" onclick="move('${j.id}','raw')">← Raw</button><button class="btn b-fwd" onclick="move('${j.id}','valid')">✓ Valid</button>` :
                    `<button class="btn b-back" onclick="move('${j.id}','review')">← Edit</button>`;

  div.innerHTML = `
    <div class="card-hdr">
      <span class="tbadge t-${j.msg_type}">${j.msg_type==='image'?'🖼️':'📝'} ${j.msg_type}</span>
      ${nbBadge}
      <span class="card-grp">${esc(j.group_name || j.source_group)}</span>
      <span class="card-time">${timeStr}</span>
    </div>
    ${imgHtml}
    <div class="fields">${fRows || noFields}</div>
    ${rawPrev}
    <div class="card-acts">
      <button class="btn b-edit" onclick="openEdit('${j.id}')">✏️ Edit</button>
      ${moveHtml}
      <button class="btn b-del" onclick="del('${j.id}')" title="Hapus">🗑</button>
    </div>`;
  return div;
}

function row(k, v) {
  return `<div class="frow"><span class="fk">${esc(k)}</span><span class="fv">${esc(String(v||''))}</span></div>`;
}

// ─── MOVE / DELETE ───────────────────────────────────────
async function move(id, status) {
  const j = all.find(x => x.id === id);
  if (!j) return;
  // send only status change, keep rest as-is
  const patch = jobToPatch(j);
  patch.status = status;
  await api('PATCH', '/api/jobs/' + id, patch);
  j.status = status;
  render();
}

async function del(id) {
  if (!confirm('Hapus job posting ini?')) return;
  await api('DELETE', '/api/jobs/' + id);
  all = all.filter(j => j.id !== id);
  render();
}

// ─── EDIT MODAL ─────────────────────────────────────────
function openEdit(id) {
  const j = all.find(x => x.id === id);
  if (!j) return;
  editId = id;

  document.getElementById('mTitle').textContent = (j.group_name || 'Job') + ' — edit';

  const iw = document.getElementById('mImgWrap');
  iw.innerHTML = (j.msg_type==='image' && j.media_path)
    ? `<img class="m-img" src="/media/${esc(j.media_path)}">` : '';

  const rw = document.getElementById('mRaw');
  if (j.raw_text) { rw.textContent = j.raw_text; rw.classList.remove('hide'); }
  else rw.classList.add('hide');

  document.getElementById('eTitle').value    = j.title       || '';
  document.getElementById('eCompany').value  = j.company     || '';
  document.getElementById('eLocation').value = j.location    || '';
  document.getElementById('eGender').value   = j.gender      || '';
  document.getElementById('eEdu').value      = j.education   || '';
  document.getElementById('eAgeMin').value   = j.age_min     || '';
  document.getElementById('eAgeMax').value   = j.age_max     || '';
  document.getElementById('eSalary').value   = j.salary      || '';
  document.getElementById('eHours').value    = j.work_hours  || '';
  document.getElementById('eContact').value  = j.contact     || '';
  document.getElementById('eCtType').value   = j.contact_type|| '';
  document.getElementById('eReqs').value     = (j.requirements||[]).join('\n');
  document.getElementById('eBens').value     = (j.benefits   ||[]).join('\n');
  document.getElementById('eStatus').value   = j.status      || 'raw';
  document.getElementById('eIsJob').checked  = j.is_job_posting !== false;

  document.getElementById('overlay').classList.remove('hide');
}

function closeModal() {
  document.getElementById('overlay').classList.add('hide');
  editId = null;
}

async function saveEdit(forceStatus) {
  if (!editId) return;
  const patch = {
    status:       forceStatus || document.getElementById('eStatus').value,
    is_job_posting: document.getElementById('eIsJob').checked,
    title:        document.getElementById('eTitle').value,
    company:      document.getElementById('eCompany').value,
    location:     document.getElementById('eLocation').value,
    gender:       document.getElementById('eGender').value,
    education:    document.getElementById('eEdu').value,
    age_min:      parseInt(document.getElementById('eAgeMin').value) || 0,
    age_max:      parseInt(document.getElementById('eAgeMax').value) || 0,
    salary:       document.getElementById('eSalary').value,
    work_hours:   document.getElementById('eHours').value,
    contact:      document.getElementById('eContact').value,
    contact_type: document.getElementById('eCtType').value,
    requirements: document.getElementById('eReqs').value.split('\n').map(s=>s.trim()).filter(Boolean),
    benefits:     document.getElementById('eBens').value.split('\n').map(s=>s.trim()).filter(Boolean),
  };
  const updated = await api('PATCH', '/api/jobs/' + editId, patch);
  const idx = all.findIndex(j => j.id === editId);
  if (idx >= 0 && updated) Object.assign(all[idx], updated);
  closeModal();
  render();
}

// ─── HELPERS ─────────────────────────────────────────────
function jobToPatch(j) {
  return {
    status: j.status||'raw', is_job_posting: j.is_job_posting!==false,
    title: j.title||'', company: j.company||'', location: j.location||'',
    gender: j.gender||'', education: j.education||'',
    age_min: j.age_min||0, age_max: j.age_max||0,
    salary: j.salary||'', work_hours: j.work_hours||'',
    contact: j.contact||'', contact_type: j.contact_type||'',
    requirements: j.requirements||[], benefits: j.benefits||[],
  };
}

async function api(method, url, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  if (!r.ok) return null;
  try { return await r.json(); } catch { return null; }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── EVENTS ──────────────────────────────────────────────
document.getElementById('fGroup').addEventListener('change', render);
document.getElementById('fType').addEventListener('change', render);
document.getElementById('fSearch').addEventListener('input', render);
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});

// Auto-refresh every 30s for new incoming jobs
setInterval(loadAll, 30000);
loadAll();
</script>
</body>
</html>
