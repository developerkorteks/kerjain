{% extends "base.html" %}

{% block title %}Server Tidak Tersedia – Kerjain{% endblock %}

{% block content %}
<div style="min-height:60vh;display:flex;align-items:center;justify-content:center;padding:40px 0">
  <div style="text-align:center;max-width:420px">
    <div style="width:56px;height:56px;border-radius:16px;background:#fff1f2;margin:0 auto 24px;display:flex;align-items:center;justify-content:center">
      <svg style="width:26px;height:26px;color:#dc2626" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
      </svg>
    </div>
    <h1 style="font-size:22px;font-weight:800;color:#0f172a;margin-bottom:10px">Server Tidak Tersedia</h1>
    <p style="font-size:14px;color:#64748b;line-height:1.7;margin-bottom:28px">{{ message }}</p>
    <div style="display:flex;gap:10px;justify-content:center">
      <a href="/" class="btn-dark">Coba Lagi</a>
      <button onclick="window.location.reload()" class="btn-ghost">Refresh</button>
    </div>
  </div>
</div>
{% endblock %}
